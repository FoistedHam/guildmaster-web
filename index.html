<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Guildmaster</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div id="app">
		<header id="header">
			<div class="header-row">
				<span id="station-name">STATION PERIPHERY-9 // COMMAND DECK</span>
				<span id="cycle-display">CYCLE 001</span>
			</div>
			<div class="header-row">
				<span id="gm-name">GUILDMASTER: UNKNOWN</span>
				<span id="status-line">MORALE: NOMINAL // THREAT: LOW</span>
			</div>
		</header>

		<div id="resource-bar"></div>

		<nav id="sector-nav">
			<button class="sector-btn" data-sector="travel">TRAVEL</button>
			<button class="sector-btn" data-sector="trade_logistics">TRADE</button>
			<button class="sector-btn" data-sector="exploration">EXPLORATION</button>
			<button class="sector-btn" data-sector="security_intel">SECURITY</button>
			<button class="sector-btn" data-sector="politics_info">POLITICS</button>
			<button class="sector-btn" data-sector="labor_affairs">LABOR</button>
			<button class="sector-btn" data-sector="engineering">ENGINEERING</button>
			<button class="sector-btn" data-sector="medical">MEDICAL</button>
		</nav>

		<main id="content">
			<h2>SECTOR CONTENT</h2>
			<p>Sector content will load here.</p>
		</main>

		<aside id="right-panel">
			<div id="cycle-log">
				<h3>CYCLE LOG</h3>
				<p>Awaiting events...</p>
			</div>
			<button id="advance-btn">ADVANCE CYCLE</button>
		</aside>
	</div>
	<script src="main.js"></script>
</body>
</html>
